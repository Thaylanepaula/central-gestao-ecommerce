function RelatorioModal({ inicio, fim, registros, onClose }) {
  const [copiado, setCopiado] = useState(false);
  const [baixado, setBaixado] = useState(false);

  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  const texto = gerarRelatorioTexto({ inicio, fim, registros });
  const dados = gerarDadosRelatorio({ inicio, fim, registros });

  const copiar = () => {
    navigator.clipboard.writeText(texto).then(() => {
      setCopiado(true);
      setTimeout(() => setCopiado(false), 2200);
    });
  };

  const baixarTxt = () => {
    const blob = new Blob([texto], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `relatorio_central_thaylane_${inicio}_a_${fim}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setBaixado(true);
    setTimeout(() => setBaixado(false), 2200);
  };

  const imprimir = () => {
    const html = gerarRelatorioHTML({ inicio, fim, registros });
    const w = window.open("", "_blank", "width=900,height=700");
    if (!w) {
      alert("O navegador bloqueou a janela de impressão. Libere pop-ups para este site.");
      return;
    }
    w.document.open();
    w.document.write(html);
    w.document.close();
    w.focus();
    setTimeout(() => {
      try { w.print(); } catch {}
    }, 350);
  };

  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed", inset: 0,
        background: "rgba(15, 23, 42, 0.5)",
        backdropFilter: "blur(6px)", WebkitBackdropFilter: "blur(6px)",
        display: "flex", alignItems: "center", justifyContent: "center",
        zIndex: 200, padding: 24,
        fontFamily: "'Inter', sans-serif",
      }}
    >
      <div
        onClick={e => e.stopPropagation()}
        style={{
          background: "#fff", borderRadius: 18,
          maxWidth: 760, width: "100%", maxHeight: "85vh",
          display: "flex", flexDirection: "column",
          boxShadow: "0 30px 70px rgba(15, 23, 42, 0.32)",
          overflow: "hidden",
        }}
      >
        <div style={{ padding: "16px 22px 12px", borderBottom: "0.5px solid #e5e7eb", display: "flex", alignItems: "flex-start", gap: 12 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", color: "#64748B", marginBottom: 4 }}>
              Relatório pronto para envio
            </div>
            <div style={{ fontSize: 16, fontWeight: 600, color: "#111", letterSpacing: "-0.01em" }}>
              {formatDataBR(inicio)} a {formatDataBR(fim)}
            </div>
            <div style={{ fontSize: 12, color: "#64748B", marginTop: 4 }}>
              {dados.diasComAtividade} de {dados.dias.length} dias com atividade ·{" "}
              {dados.totalRegistros} {dados.totalRegistros === 1 ? "registro" : "registros"} ·{" "}
              {dados.totalObs} {dados.totalObs === 1 ? "observação" : "observações"}
              {dados.impactoTotal !== 0 && ` · impacto ${formatBRL(dados.impactoTotal)}`}
            </div>
          </div>
          <button onClick={onClose} aria-label="Fechar" style={{ fontSize: 22, color: "#9ca3af", background: "none", border: "none", cursor: "pointer", padding: "0 4px", lineHeight: 1 }}>×</button>
        </div>

        <div style={{ flex: 1, overflow: "auto", background: "#0F172A" }}>

function SecaoObsChecklist({ dateKey, rotulo } = {}) {
  const chave = dateKey || todayKey();
  const ehHoje = chave === todayKey();
  const [copiado, setCopiado] = useState(false);

  const obs = (() => {
    try {
      const raw = localStorage.getItem("obs_" + chave);
      return raw ? JSON.parse(raw) : {};
    } catch {
      return {};
    }
  })();

  const linhas = CHECKLIST.flatMap(bloco =>
    bloco.items.map(item => ({
      id: item.id,
      tarefa: item.texto,
      obs: (obs[item.id] || "").trim(),
      hora: bloco.hora,
      cor: bloco.cor,
      bg: bloco.bg,
      badge: bloco.badge,
      bloco: bloco.label,
    }))
  ).filter(r => r.obs);

  const rotuloData = rotulo || (ehHoje ? "hoje" : formatDataBR(chave));

  const copiar = () => {
    if (!linhas.length) return;
    const texto = linhas.map(l => `Tarefa: ${l.tarefa} - Obs: ${l.obs}`).join("\n");
    navigator.clipboard.writeText(texto).then(() => {
      setCopiado(true);
      setTimeout(() => setCopiado(false), 2000);

  if (linhas.length === 0) {

        {ehHoje && (
          <div style={{ fontSize: 11, color: "#aaa", marginTop: 4 }}>
            Digite no campo <em>"O que você observou?"</em> de cada item no Painel para alimentar essa lista.
          </div>
        )}
      </div>
    );
  }

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, gap: 8, flexWrap: "wrap" }}>
        <span style={{ fontSize: 12, color: "#555" }}>
          {linhas.length} observaç{linhas.length === 1 ? "ão" : "ões"} do checklist {rotuloData === "hoje" ? "de hoje" : "em " + rotuloData}
        </span>
        <button
          onClick={copiar}
          style={{
            fontFamily: "'Inter', sans-serif", fontSize: 12, fontWeight: 500,
            padding: "5px 12px", borderRadius: 9,
            border: "0.5px solid " + (copiado ? "#166534" : "#d0cfc8"),

          </svg>
          {copiado ? "Copiado ✓" : "Copiar lista"}

      <div style={{ marginBottom: "2rem", display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
        <div style={{ flex: 1, minWidth: 220 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 5 }}>
            <span style={{ fontSize: 11, fontWeight: 500, color: plenoMet ? "#8A6A10" : "#888", letterSpacing: "0.01em" }}>
              Evolução para Pleno{plenoMet ? " · meta do mês atingida" : ""}
            </span>
            <span style={{ fontSize: 11, color: plenoMet ? "#8A6A10" : "#bbb" }}>
              {registrosMes} de {META_PLENO} registros este mês
            </span>
          </div>
          <div style={{ height: 3, background: "#ececec", borderRadius: 2 }}>
            <div style={{ height: 3, width: pctPleno + "%", background: plenoMet ? "#D4AF37" : "#534AB7", borderRadius: 2, transition: "width 0.4s " + EASE + ", background 0.3s " + EASE }} />
          </div>
        </div>
        <div style={{
          display: "flex", alignItems: "center", gap: 10,
          padding: "8px 14px", borderRadius: 12,
          background: impactosMes > 0 ? "#DDF1F1" : "#F1EFE8",
          border: "0.5px solid " + (impactosMes > 0 ? "#9FD4D4" : "#e0deda"),
        }}>
          <div style={{
            fontSize: 22, fontWeight: 600,
            color: impactosMes > 0 ? "#0C6170" : "#bbb",
            lineHeight: 1, fontVariantNumeric: "tabular-nums",
            letterSpacing: "-0.02em",
          }}>{impactosMes}</div>
          <div style={{
            fontSize: 10, fontWeight: 600,
            color: impactosMes > 0 ? "#0C6170" : "#888",
            lineHeight: 1.2, letterSpacing: "0.03em", textTransform: "uppercase",
          }}>impactos<br/>no mês</div>
        </div>
      </div>

      <HistoricoNavegador
        inicio={inicio}
        fim={fim}
        setInicio={setInicio}
        setFim={setFim}
        onExportar={() => setModalAberto(true)}
      />

      <div style={{ background: "#FFFBEB", borderRadius: 20, padding: "20px 20px 24px", border: "0.5px solid #FDE68A", marginBottom: "1.5rem" }}>
        <SecaoHeader
          title={ehUmDia ? `Observações do checklist · ${rotuloPeriodo}` : "Observações do checklist no período"}
          subtitle="Tudo que você digitou nos campos 'O que você observou?' aparece aqui automaticamente"
        />
        {ehUmDia ? (
          <SecaoObsChecklist dateKey={inicio} />
        ) : !algumaObs ? (
          <div style={{
            background: "#fff", border: "0.5px dashed #d0cfc8",
            borderRadius: 14, padding: "24px 20px", textAlign: "center",
            fontSize: 13, color: "#888",
          }}>
            Nenhuma observação registrada nos dias selecionados.
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
            {obsLinhasPorDia.filter(d => d.temObs).map(({ ymd }) => (
              <div key={ymd}>
                <div style={{
                  fontSize: 12, fontWeight: 600,
                  color: "#7A5F00", marginBottom: 8,
                  padding: "4px 10px", borderRadius: 6,
                  background: "#FEF3C7",
                  display: "inline-block",
                  letterSpacing: "-0.005em",
                }}>
                  {formatDataLongaBR(ymd)}
                </div>
                <SecaoObsChecklist dateKey={ymd} rotulo={formatDataBR(ymd)} />
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{ background: "#EFF6FF", borderRadius: 20, padding: "20px 20px 24px", border: "0.5px solid #DBEAFE" }}>
        <SecaoHeader
          title={ehUmDia ? `Timeline de impacto · ${rotuloPeriodo}` : "Timeline de impacto no período"}
          subtitle="Feed dos registros do diário · filtrado pelo período selecionado"
        />
        <SecaoDiario
          registros={registros}
          setRegistros={setRegistros}
          status={status}
          historico={historico}
          filtroData={filtroData}
          rotuloPeriodo={rotuloPeriodo}
          ocultarForm
        />
      </div>

      {modalAberto && (
        <RelatorioModal
          inicio={inicio}
          fim={fim}
          registros={registros}
          onClose={() => setModalAberto(false)}
        />
      )}
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [view, setView] = useStorage("app_view", "painel"); // painel | analise | historico
  const [registros, setRegistros] = useStorage("diario_registros", []);
  const [status, setStatus] = useStorage("status_rapido", { venda: "", meta: "" });
  const [historico, setHistorico] = useStorage("historicoVendas", []);
  const vendaHoje = parseBRL(status.venda);
  const hoje = todayKey();
  // Fonte única de verdade para checklist (done) e observações (obs) do dia.
  // Todas as instâncias de <SecaoChecklist> leem e gravam através destes setters,
  // o que elimina a race condition que fazia obs sumirem entre seções.
  const [checklistDone, setChecklistDone] = useStorage("chk_" + hoje, {});
  const [checklistObs, setChecklistObs] = useStorage("obs_" + hoje, {});
  const [queriesUsadas, setQueriesUsadas] = useStorage("queries_usadas_" + hoje, {});
  const secAtiva = secaoAgora();
  const total = CHECKLIST.reduce((s, b) => s + b.items.length, 0);
  const count = Object.values(checklistDone).filter(Boolean).length;
  const pct = total > 0 ? Math.round((count / total) * 100) : 0;

  const agora = new Date();
  const registrosMesArr = registros.filter(r => {
    const d = new Date(r.id);
    return d.getMonth() === agora.getMonth() && d.getFullYear() === agora.getFullYear();
  });
  const registrosMes = registrosMesArr.length;
  const impactosMes = registrosMesArr.filter(r => typeof r.impacto === "number").length;
  const META_PLENO = 20;
  const pctPleno = Math.min(100, Math.round((registrosMes / META_PLENO) * 100));
  const plenoMet = registrosMes >= META_PLENO;

  const viewTitle = view === "painel" ? "Painel de Controle"
    : view === "analise" ? "Análise de Dados"
    : view === "semana" ? "Planejamento da Semana"
    : "Histórico de Impacto";

  const [agoraTick, setAgoraTick] = useState(Date.now());
  useEffect(() => {
    const id = setInterval(() => setAgoraTick(Date.now()), 60 * 1000);
    return () => clearInterval(id);
  }, []);
  const hojeDateStr = new Date(agoraTick).toDateString();
  const temImpactoHoje = registros.some(r =>
    typeof r.impacto === "number" && new Date(r.id).toDateString() === hojeDateStr
  );
  const pendenciaImpacto = new Date(agoraTick).getHours() >= 16 && !temImpactoHoje;

  return (
    <div style={{ fontFamily: "'Inter', sans-serif", background: "#F8FAFC", minHeight: "100vh" }}>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="anonymous" />
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

      <Sidebar view={view} setView={setView} pendenciaImpacto={pendenciaImpacto} />

      <div style={{ paddingLeft: 72, paddingRight: 340 }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", padding: "1.75rem 1.5rem 7rem" }}>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1.25rem", flexWrap: "wrap", gap: 14 }}>
            <h1 style={{ fontSize: 22, fontWeight: 600, color: "#111", margin: 0, letterSpacing: "-0.02em" }}>{viewTitle}</h1>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ width: 7, height: 7, borderRadius: "50%", background: pct === 100 ? "#639922" : count > 0 ? "#534AB7" : "#ccc" }} />
              <span style={{ fontSize: 12, color: "#888", fontWeight: 500, fontVariantNumeric: "tabular-nums" }}>{count}/{total} · {pct}%</span>
            </div>
          </div>

          {view === "painel" && (
            <div>
              <Cockpit status={status} setStatus={setStatus} setHistorico={setHistorico} compact />

              {SECOES.map((sec) => {
                const ativa = sec.id === secAtiva;
                const blocosSet = sec.blocos;
                return (
                  <section
                    key={sec.id}
                    style={{
                      opacity: ativa ? 1 : 0.3,
                      filter: ativa ? "none" : "saturate(0.8)",
                      transition: "opacity 0.3s " + EASE + ", filter 0.3s " + EASE,
                      marginBottom: 28,
                      padding: "24px 28px 28px",
                      background: "#fff",
                      border: "0.5px solid " + (ativa ? sec.accent : "#e5e7eb"),
                      borderLeft: "4px solid " + sec.accent,
                      borderRadius: 18,
                      boxShadow: ativa ? "0 4px 16px rgba(15, 23, 42, 0.06)" : "none",
                    }}
                    onMouseEnter={(e) => { if (!ativa) { e.currentTarget.style.opacity = 0.7; } }}
                    onMouseLeave={(e) => { if (!ativa) { e.currentTarget.style.opacity = 0.3; } }}
                  >
                    <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 18, flexWrap: "wrap" }}>
                      <span style={{
                        fontSize: 13, fontWeight: 700,
                        padding: "5px 12px", borderRadius: 8,
                        background: sec.bg, color: sec.accent,
                        letterSpacing: "0.02em",
                        fontVariantNumeric: "tabular-nums",
                      }}>{sec.horario}</span>
                      <h2 style={{
                        fontSize: 18, fontWeight: 600, color: "#111",
                        margin: 0, letterSpacing: "-0.02em",
                      }}>{sec.titulo}</h2>
                      {ativa && (
                        <span style={{
                          fontSize: 10, fontWeight: 700,
                          padding: "3px 9px", borderRadius: 999,
                          background: sec.accent, color: "#fff",
                          letterSpacing: "0.06em", textTransform: "uppercase",
                        }}>agora</span>
                      )}
                    </div>

                    <QueriesFaseList
                      queryIds={sec.queries}
                      usadas={queriesUsadas}
                      setUsadas={setQueriesUsadas}
                      ativa={ativa}
                    />

                    <div style={{ fontSize: 11, fontWeight: 600, color: "#888", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 12 }}>
                      Checklist
                    </div>
                    <SecaoChecklist
                      filterBloco={(b) => blocosSet.indexOf(b.hora) !== -1}
                      minimal
                      usadas={queriesUsadas}
                      setUsadas={setQueriesUsadas}
                      done={checklistDone}
                      setDone={setChecklistDone}
                      obs={checklistObs}
                      setObs={setChecklistObs}
                    />

                    {sec.incluiDiario && (
                      <div style={{ marginTop: 24 }}>
                        <div style={{ fontSize: 11, fontWeight: 600, color: "#888", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 12 }}>
                          Diário de Impacto
                        </div>
                        <SecaoDiario registros={registros} setRegistros={setRegistros} status={status} historico={historico} />
                      </div>
                    )}
                  </section>
                );
              })}
            </div>
          )}

          {view === "analise" && (
            <div>
              <InsightsLuma venda={vendaHoje} historico={historico} />

              <div style={{
                display: "grid",
                gridTemplateColumns: "repeat(auto-fit, minmax(440px, 1fr))",
                gap: 64,
                alignItems: "start",
              }}>
                <div style={{ minWidth: 0, background: "#EFF6FF", borderRadius: 20, padding: "20px 20px 24px", border: "0.5px solid #DBEAFE" }}>
                  <SecaoHeader title="Queries SQL" subtitle="Entrada de dados · extrai o que precisa saber" />
                  <SecaoQueries />
                </div>
                <div style={{ minWidth: 0, background: "#EFF6FF", borderRadius: 20, padding: "20px 20px 24px", border: "0.5px solid #DBEAFE" }}>
                  <SecaoHeader title="Daily Pulse" subtitle="Síntese · transforma dado em narrativa para o Teams" />
                  <SecaoPulse />
                </div>
                <div style={{ minWidth: 0, background: "#F9FAFB", borderRadius: 20, padding: "20px 20px 24px", border: "0.5px solid #E2E8F0" }}>
                  <SecaoHeader title="Top SKUs Curva A" subtitle="SKUs prioritários · Eletro e Metais" />
                  <SecaoTopSKUs />
                </div>
              </div>
            </div>
          )}

          {view === "semana" && (
            <div>
              <div style={{ background: "#EEEDFE", borderRadius: 20, padding: "20px 20px 24px", border: "0.5px solid #CECBF6" }}>
                <SecaoHeader title="Agenda da semana" subtitle="Rituais, reuniões e foco de cada dia · clique para expandir" />
                <SecaoSemana />
              </div>
            </div>
          )}

          {view === "historico" && (
            <HistoricoView
              registros={registros}
              setRegistros={setRegistros}
              status={status}
              historico={historico}
              registrosMes={registrosMes}
              pctPleno={pctPleno}
              plenoMet={plenoMet}
              impactosMes={impactosMes}
              META_PLENO={META_PLENO}
            />
          )}

        </div>
      </div>

      <AnotacoesLaterais />

      <DiarioFooter registros={registros} setRegistros={setRegistros} impactosMes={impactosMes} status={status} />
    </div>
  );
}
(async () => {
  try { await window.__fetchSupabaseInicial?.(); } catch {}
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
})();
    </script>
</body>
</html>
