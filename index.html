        // ── SUPABASE · sincronização Checklist + Bloco de Notas ──────────────
        // Schema da tabela `registros_central`:
        //   id            uuid  (default gen_random_uuid())
        //   data_registro date
        //   tipo_dado     text  ("checklist_done" | "checklist_obs" | "anotacoes")
        //   conteudo      jsonb
        //   user_id       uuid  (nullable · não usamos auth)
        // É preciso existir um UNIQUE em (data_registro, tipo_dado) para o upsert
        // funcionar — veja o SQL no README/chat.
        const SUPABASE_URL = "https://uwezvczizkzmtfzlabyn.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_oQiDFX2bTKcC1Kfzsbr6EA_uxomaK9n";
        const sb = (window.supabase && window.supabase.createClient)
          ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
          : null;

        const _hojeISO = () => new Date().toISOString().split("T")[0];

        // Chaves do localStorage que devem ser espelhadas no Supabase
        function isSupabaseSyncKey(k) {
          if (typeof k !== "string") return false;
          if (k === "anotacoes_laterais") return true;
          if (k.startsWith("chk_")) return true;
          if (k.startsWith("obs_")) return true;
          return false;
        }

        // Monta as 3 linhas (uma por tipo_dado) com o estado de hoje
        function _montarLinhasHoje() {
          const dia = _hojeISO();
          const getJSON = (k, def) => {
            try { const s = localStorage.getItem(k); return s ? JSON.parse(s) : def; }
            catch { return def; }
          };
          const anot = getJSON("anotacoes_laterais", "");
          return [
            {
              data_registro: dia,
              tipo_dado: "checklist_done",
              conteudo: getJSON("chk_" + dia, {}) || {},
            },
            {
              data_registro: dia,
              tipo_dado: "checklist_obs",
              conteudo: getJSON("obs_" + dia, {}) || {},
            },
            {
              data_registro: dia,
              tipo_dado: "anotacoes",
              conteudo: { texto: typeof anot === "string" ? anot : "" },
            },
          ];
        }

        // Debounce · agrupa rajadas de digitação em um único upsert
        let _sbTimer = null;
        let _sbPending = false;
        function agendarSyncSupabase() {
          if (!sb) return;
          _sbPending = true;
          if (_sbTimer) clearTimeout(_sbTimer);
          _sbTimer = setTimeout(async () => {
            _sbPending = false;
            try {
              const linhas = _montarLinhasHoje();
              const { error } = await sb
                .from("registros_central")
                .upsert(linhas, { onConflict: "data_registro,tipo_dado" });
              if (error) console.warn("[Supabase] upsert falhou:", error.message, error);
            } catch (e) {
              console.warn("[Supabase] erro no upsert:", e);
            }
          }, 1200); // 1.2s depois da última tecla
        }
        window.__agendarSyncSupabase = agendarSyncSupabase;

        // Flush imediato ao fechar/trocar de aba · não perde últimas digitações
        window.addEventListener("beforeunload", () => {
          if (!sb || !_sbPending) return;
          try {
            const linhas = _montarLinhasHoje();
            const url = SUPABASE_URL + "/rest/v1/registros_central?on_conflict=data_registro,tipo_dado";
            const body = JSON.stringify(linhas);
            if (navigator.sendBeacon) {
              // sendBeacon manda como text/plain, mas o PostgREST aceita se o body for JSON válido
              const blob = new Blob([body], { type: "application/json" });
              navigator.sendBeacon(url, blob);
            } else {
              fetch(url, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "apikey": SUPABASE_ANON_KEY,
                  "Authorization": "Bearer " + SUPABASE_ANON_KEY,
                  "Prefer": "resolution=merge-duplicates",
                },
                body,
                keepalive: true,
              });
            }
          } catch {}
        });

        // Fetch inicial · hidrata o localStorage com o registro mais recente de cada tipo
        async function fetchSupabaseInicial() {
          if (!sb) return;
          try {
            const { data, error } = await sb
              .from("registros_central")
              .select("data_registro, tipo_dado, conteudo")
              .order("data_registro", { ascending: false });
            if (error) { console.warn("[Supabase] fetch falhou:", error.message, error); return; }
            if (!data || data.length === 0) return;
            // Pega a linha mais recente por tipo_dado
            const maisRecente = {};
            for (const row of data) {
              if (!maisRecente[row.tipo_dado]) maisRecente[row.tipo_dado] = row;
            }
            const dia = _hojeISO();
            const done = maisRecente["checklist_done"];
            const obs  = maisRecente["checklist_obs"];
            const anot = maisRecente["anotacoes"];
            if (done && done.conteudo && typeof done.conteudo === "object") {
              const d = done.data_registro || dia;
              localStorage.setItem("chk_" + d, JSON.stringify(done.conteudo));
            }
            if (obs && obs.conteudo && typeof obs.conteudo === "object") {
              const d = obs.data_registro || dia;
              localStorage.setItem("obs_" + d, JSON.stringify(obs.conteudo));
            }
            if (anot && anot.conteudo) {
              const c = anot.conteudo;
              const txt = (c && typeof c === "object" && typeof c.texto === "string")
                ? c.texto
                : (typeof c === "string" ? c : "");
              localStorage.setItem("anotacoes_laterais", JSON.stringify(txt));
            }
          } catch (e) {
            console.warn("[Supabase] erro no fetch inicial:", e);
          }
        }
        window.__fetchSupabaseInicial = fetchSupabaseInicial;

    sql: `WITH SEMANA_ATUAL AS (

  INNER JOIN SFC_CARRINHO_ITEM I ON I.PRODUTO = P.CODIGO
  INNER JOIN AGTC Y ON P.COMPRADOR = Y.CODIGO

    ROUND(((A.PRECO - B.PRECO) / B.PRECO) * 100, 2) AS VAR_PRECO_PCT,

    A.QTDE  AS QTDE_SEM_ATUAL,
    ROUND(((A.QTDE  - B.QTDE)  / B.QTDE)  * 100, 2) AS VAR_QTDE_PCT,
    ROUND(
      ((A.QTDE  - B.QTDE)  / B.QTDE) /
      NULLIF((A.PRECO - B.PRECO) / B.PRECO, 0)
    , 2) AS ELASTICIDADE
FROM SEMANA_ATUAL A
INNER JOIN SEMANA_ANT B ON A.CODIGO = B.CODIGO
WHERE B.PRECO > 0
  AND B.QTDE  > 0
  AND A.PRECO <> B.PRECO
ORDER BY A.QTDE DESC
FETCH FIRST 15 ROWS ONLY;`

  {
    id: "q6", label: "Alerta de anomalia (hoje vs média 15d)", badge: "crítico", badgeCor: "#791F1F", badgeBg: "#F09595",

    sql: `WITH MEDIA_15D AS (
  SELECT P.CODIGO, P.DESCRICAO, Y.NOME AS COMPRADOR,
      ROUND(AVG(VD.VALOR_DIA), 2) AS MEDIA_DIARIA_RS,
      ROUND(AVG(VD.QTDE_DIA), 2)  AS MEDIA_DIARIA_QTDE,
      COUNT(VD.DIA)               AS DIAS_COM_VENDA
  FROM PROD P
  INNER JOIN AGTC Y ON P.COMPRADOR = Y.CODIGO
  INNER JOIN (
    SELECT I.PRODUTO,
        TRUNC(I.DT_CRIACAO)       AS DIA,
        SUM(I.PRECO * I.QUANTIDADE) AS VALOR_DIA,
        SUM(I.QUANTIDADE)         AS QTDE_DIA
    FROM SFC_CARRINHO_ITEM I
    WHERE I.STATUS_PEDIDO IN (0,251,95,114,14,18,7,13,3,25,71)
      AND TRUNC(I.DT_CRIACAO) >= TRUNC(SYSDATE) - 15

    GROUP BY I.PRODUTO, TRUNC(I.DT_CRIACAO)
  ) VD ON VD.PRODUTO = P.CODIGO
  WHERE Y.CODIGO IN (18877, 19364, 29057)
  GROUP BY P.CODIGO, P.DESCRICAO, Y.NOME
),
HOJE AS (
  SELECT I.PRODUTO,
      ROUND(SUM(I.PRECO * I.QUANTIDADE), 2) AS VALOR_HOJE,
      ROUND(SUM(I.QUANTIDADE))              AS QTDE_HOJE
  FROM SFC_CARRINHO_ITEM I
  WHERE I.STATUS_PEDIDO IN (0,251,95,114,14,18,7,13,3,25,71)
    AND TRUNC(I.DT_CRIACAO) = TRUNC(SYSDATE)
  GROUP BY I.PRODUTO
)
SELECT M.CODIGO, M.DESCRICAO, M.COMPRADOR,
    M.MEDIA_DIARIA_RS,
    NVL(H.VALOR_HOJE, 0)                                  AS VALOR_HOJE,
    ROUND(NVL(H.VALOR_HOJE, 0) - M.MEDIA_DIARIA_RS, 2)    AS GAP_RS,
    ROUND(((NVL(H.VALOR_HOJE, 0) - M.MEDIA_DIARIA_RS)
           / M.MEDIA_DIARIA_RS) * 100, 2)                 AS GAP_PCT,
    CASE
      WHEN NVL(H.VALOR_HOJE, 0) = 0 AND M.MEDIA_DIARIA_RS >= 500 THEN 'ZERADO · ALTO RISCO'
      WHEN NVL(H.VALOR_HOJE, 0) = 0                              THEN 'ZERADO'
      WHEN NVL(H.VALOR_HOJE, 0) < M.MEDIA_DIARIA_RS * 0.3        THEN 'QUEDA > 70%'
      WHEN NVL(H.VALOR_HOJE, 0) < M.MEDIA_DIARIA_RS * 0.5        THEN 'QUEDA > 50%'
      ELSE 'NORMAL'
    END AS SEVERIDADE
FROM MEDIA_15D M
LEFT JOIN HOJE H ON H.PRODUTO = M.CODIGO
WHERE M.MEDIA_DIARIA_RS > 0
  AND M.DIAS_COM_VENDA  >= 3
  AND NVL(H.VALOR_HOJE, 0) < M.MEDIA_DIARIA_RS * 0.5
ORDER BY
    CASE WHEN NVL(H.VALOR_HOJE, 0) = 0 THEN 0 ELSE 1 END,
    M.MEDIA_DIARIA_RS DESC
FETCH FIRST 20 ROWS ONLY;`

const today = () => new Date().toLocaleDateString("pt-BR", { weekday: "long", day: "2-digit", month: "long" });
const todayKey = () => new Date().toISOString().split("T")[0];

function useStorage(key, def) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; } catch { return def; }
  });
  const set = (v) => {
    setVal(v);
    try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
    if (isSupabaseSyncKey(key) && typeof window.__agendarSyncSupabase === "function") {
      window.__agendarSyncSupabase();
    }
  };
  return [val, set];
}

// snapshotMeta · tira uma foto do Cockpit no instante em que o Diário é salvo
// Retorna null só quando não há nem venda nem meta preenchidos
function snapshotMeta(venda, meta) {
  const v = (typeof venda === "number" && !isNaN(venda)) ? venda : null;
  const m = (typeof meta === "number" && !isNaN(meta)) ? meta : null;
  if (v === null && m === null) return null;
  const gap = (v !== null && m !== null) ? Math.max(0, m - v) : null;
  const pctMeta = (v !== null && m !== null && m > 0) ? (v / m) * 100 : null;
  const metaBatida = (v !== null && m !== null && v >= m);
  return { venda: v, meta: m, gap, pctMeta, metaBatida };
}

// historicoVendas · série temporal de faturamento x meta, um registro por dia (upsert)
// shape: [{ data: "YYYY-MM-DD", valor: number|null, meta: number|null, atualizadoEm: ISOString }, ...]
function salvarHistoricoVendas(valor, meta) {
  if (valor === null && meta === null) return null;
  const data = todayKey();
  let hist = [];
  try {
    const raw = localStorage.getItem("historicoVendas");
    const parsed = raw ? JSON.parse(raw) : [];
    if (Array.isArray(parsed)) hist = parsed;
  } catch {}
  const registro = { data, valor, meta, atualizadoEm: new Date().toISOString() };
  const idx = hist.findIndex(r => r && r.data === data);
  if (idx >= 0) hist[idx] = registro; else hist.push(registro);
  hist.sort((a, b) => (a.data || "").localeCompare(b.data || ""));
  try { localStorage.setItem("historicoVendas", JSON.stringify(hist)); } catch {}
  return hist;
}

const EASE = "cubic-bezier(0.4, 0, 0.2, 1)";

function Btn({ onClick, children, primary, small, disabled }) {
  const [hover, setHover] = useState(false);

  return (
    <button
      onClick={onClick}
      disabled={disabled}
      onMouseEnter={() => !disabled && setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        fontFamily: "'Inter', sans-serif",
        fontSize: small ? 12 : 13, fontWeight: 500,
        padding: small ? "5px 12px" : "9px 18px",
        borderRadius: 9, cursor: disabled ? "default" : "pointer",

        transform: hover && !disabled ? "translateY(-1px)" : "translateY(0)",

function baseDaHora(hora) {
  if (hora.includes("9h30")) return "9h30";
  if (hora.startsWith("11h")) return "11h";
  if (hora.startsWith("14h")) return "14h";
  if (hora.startsWith("15h")) return "15h";
  if (hora.startsWith("17h")) return "17h";
  return null;
}

function baseAtualAgora() {
  const h = new Date().getHours() + new Date().getMinutes() / 60;
  if (h < 10) return "9h30";
  if (h < 12.5) return "11h";
  if (h < 14.5) return "14h";
  if (h < 16) return "15h";
  return "17h";
}

function QueryModal({ query, onClose }) {
  const [copied, setCopied] = useState(false);
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  if (!query) return null;

  const copy = () => {
    navigator.clipboard.writeText(query.sql).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

    <div onClick={onClose} style={{

  // para evitar que múltiplas instâncias desta seção sobrescrevam o localStorage
  // umas das outras quando montadas em paralelo no Painel.
  const [expanded, setExpanded] = useState({});
  const [copiedId, setCopiedId] = useState(null);
  const [resumoCopiado, setResumoCopiado] = useState(false);

  const blocos = filterBloco ? CHECKLIST.filter(filterBloco) : CHECKLIST;
  const itens = blocos.flatMap(b => b.items);
  const total = itens.length;
  const count = itens.filter(it => !!done[it.id]).length;
  const pct = total > 0 ? Math.round((count / total) * 100) : 0;

  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 60 * 1000);
    return () => clearInterval(id);
  }, []);

  const baseAtual = baseAtualAgora();

  const toggle = (id) => setDone({ ...done, [id]: !done[id] });
  const reset = () => setDone({});
  const setObservacao = (id, texto) => setObs({ ...obs, [id]: texto });
  // Observação: como done/obs agora vêm do App, todas as instâncias paralelas
  // compartilham o mesmo objeto — não há mais risco de sobrescrita cruzada.

  const copiarResumoDoDia = () => {
    const todosItens = CHECKLIST.flatMap(b => b.items);
    const linhas = todosItens
      .map(it => {
        const texto = (obs[it.id] || "").trim();
        if (!texto) return null;
        return `Tarefa: ${it.texto} - Obs: ${texto}`;
      })
      .filter(Boolean);
    const cabecalho = `Resumo do dia · ${new Date().toLocaleDateString("pt-BR", { day: "2-digit", month: "long", year: "numeric" })}`;
    const corpo = linhas.length > 0 ? linhas.join("\n") : "Nenhuma observação registrada hoje.";
    const conteudo = cabecalho + "\n\n" + corpo;
    navigator.clipboard.writeText(conteudo).then(() => {
      setResumoCopiado(true);
      setTimeout(() => setResumoCopiado(false), 2500);
    });
  };

  const toggleQuery = (itemId, queryId) => {
    const abrindo = !expanded[itemId];
    setExpanded({ ...expanded, [itemId]: abrindo });
    if (abrindo && setUsadas && usadas && !usadas[queryId]) {
      setUsadas({ ...usadas, [queryId]: Date.now() });
    }
  };

  const copiar = (queryId, sql) => {
    navigator.clipboard.writeText(sql).then(() => {
      setCopiedId(queryId);
      setTimeout(() => setCopiedId(null), 2000);
    });
  };

              fontFamily: "'Inter', sans-serif",
              fontSize: 12, fontWeight: 500,
              padding: "5px 12px", borderRadius: 9,
              border: "0.5px solid " + (resumoCopiado ? "#166534" : "#d0cfc8"),
              background: resumoCopiado ? "#DCFCE7" : "transparent",
              color: resumoCopiado ? "#166534" : "#333",
              cursor: "pointer",
              display: "inline-flex", alignItems: "center", gap: 6,
              transition: TRANSITION,
            }}
            title="Copia todas as observações preenchidas no formato: Tarefa: [Nome] - Obs: [Texto]"
          >
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
            {resumoCopiado ? "Resumo copiado ✓" : "Copiar Resumo do Dia"}
          </button>
          <Btn small onClick={reset}>Reiniciar</Btn>
        </div>
      </div>
      <div style={{ height: 4, background: "#eee", borderRadius: 2, marginBottom: 26 }}>
        <div style={{ height: 4, width: pct + "%", background: pct === 100 ? "#639922" : "#111", borderRadius: 2, transition: "width 0.3s " + EASE }} />
      </div>

      {pct === 100 && (
        <div style={{ background: "#EAF3DE", border: "0.5px solid #97C459", borderRadius: 10, padding: "10px 14px", marginBottom: 20, fontSize: 13, color: "#27500A", fontWeight: 500, textAlign: "center" }}>

                                <pre style={{
                                  margin: 0, padding: "12px 14px",
                                  fontSize: 11, lineHeight: 1.6,
                                  color: "#E2E8F0",
                                  fontFamily: "'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace",
                                  whiteSpace: "pre-wrap", wordBreak: "break-word",
                                  maxHeight: 320, overflow: "auto",
                                }}>{q.sql}</pre>
                              </div>
                            )}
                          </div>
                        );
                      })()}
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function IconCopy({ size = 14, color = "#94A3B8" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
    </svg>
  );
}

function IconCheck({ size = 14, color = "#166534" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <polyline points="20 6 9 17 4 12" />
    </svg>
  );
}

function SecaoQueries() {
  const [open, setOpen] = useState(null);
  const [copied, setCopied] = useState(null);

  const copy = (e, id, sql) => {
    if (e && e.stopPropagation) e.stopPropagation();
    navigator.clipboard.writeText(sql).then(() => { setCopied(id); setTimeout(() => setCopied(null), 2000); });
  };

  return (
    <div>
      {QUERIES.map((q) => {
        const isOpen = open === q.id;
        const wasCopied = copied === q.id;
        return (
          <div key={q.id} style={{
            background: "rgba(255, 255, 255, 0.7)",
            backdropFilter: "blur(10px)",
            WebkitBackdropFilter: "blur(10px)",
            border: "1px solid rgba(255, 255, 255, 0.5)",
            boxShadow: "0 1px 3px rgba(15, 23, 42, 0.04)",
            borderRadius: 14,
            overflow: "hidden",
            marginBottom: 6,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px" }}>
              <span style={{ fontSize: 13, fontWeight: 500, color: "#0F172A", flex: 1, letterSpacing: "-0.01em" }}>
                {q.label}
              </span>
              <button
                onClick={() => setOpen(isOpen ? null : q.id)}
                style={{
                  fontSize: 11, fontWeight: 500, color: "#64748B",
                  background: "transparent", border: "none", cursor: "pointer",
                  padding: "4px 6px", fontFamily: "'Inter', sans-serif",
                  transition: TRANSITION,
                }}
                title={isOpen ? "Ocultar código" : "Ver código"}
                onMouseEnter={e => { e.currentTarget.style.color = "#0F172A"; }}
                onMouseLeave={e => { e.currentTarget.style.color = "#64748B"; }}
              >
                {isOpen ? "Ocultar" : "Ver Código"}
              </button>
              <button
                onClick={(e) => copy(e, q.id, q.sql)}
                style={{
                  display: "flex", alignItems: "center", justifyContent: "center",
                  width: 28, height: 28, borderRadius: 7,
                  background: wasCopied ? "#DCFCE7" : "transparent",
                  border: "none", cursor: "pointer",
                  transition: TRANSITION,
                }}
                title={wasCopied ? "Copiado!" : "Copiar SQL"}
                onMouseEnter={e => { if (!wasCopied) e.currentTarget.style.background = "rgba(15, 23, 42, 0.04)"; }}
                onMouseLeave={e => { if (!wasCopied) e.currentTarget.style.background = "transparent"; }}
              >
                {wasCopied ? <IconCheck /> : <IconCopy />}
              </button>
            </div>
            {isOpen && (
              <div style={{ borderTop: "0.5px solid rgba(15, 23, 42, 0.06)" }}>
                <pre style={{
                  margin: 0, padding: "12px 14px",
                  fontSize: 11, lineHeight: 1.7,
                  fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace",
                  color: "#334155",
                  background: "rgba(241, 245, 249, 0.6)",
                  overflowX: "auto", whiteSpace: "pre-wrap", wordBreak: "break-word",
                }}>{q.sql}</pre>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

const parseBRL = (s) => {
  if (s === null || s === undefined || s === "") return null;
  const cleaned = String(s).replace(/[^\d,.-]/g, "").replace(/\./g, "").replace(",", ".");
  const n = parseFloat(cleaned);
  return isNaN(n) ? null : n;
};
const formatBRL = (n) => new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(n);
const formatBRLInt = (n) => new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL", maximumFractionDigits: 0 }).format(n);

function SecaoDiario({ registros, setRegistros, status, historico, filtroData, rotuloPeriodo, ocultarForm }) {
  const [oq, setOq] = useState("");
  const [pq, setPq] = useState("");
  const [ac, setAc] = useState("");
  const [im, setIm] = useState("");
  const [formOpen, setFormOpen] = useState(false);

  const impactoNum = parseBRL(im);
  const registrosVisiveis = filtroData ? registros.filter(filtroData) : registros;

  const salvar = () => {
    if (!oq && !pq && !ac && impactoNum === null) return;
    const novo = {
      id: Date.now(),
      data: new Date().toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" }),
      hora: new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" }),
      oq, pq, ac,
      impacto: impactoNum,
      metaSnapshot: snapshotMeta(parseBRL(status && status.venda), parseBRL(status && status.meta)),
    };
    setRegistros([novo, ...registros]);
    setOq(""); setPq(""); setAc(""); setIm("");
    setFormOpen(false);

  const limpar = () => { setOq(""); setPq(""); setAc(""); setIm(""); };
  const remover = (id) => setRegistros(registros.filter(r => r.id !== id));

  const ultimoImpacto = registrosVisiveis.find(r => typeof r.impacto === "number" && r.impacto !== 0);
  const agoraT = new Date();
  const somaMes = registrosVisiveis
    .filter(r => typeof r.impacto === "number" && new Date(r.id).getMonth() === agoraT.getMonth() && new Date(r.id).getFullYear() === agoraT.getFullYear())
    .reduce((s, r) => s + r.impacto, 0);
  const somaPeriodo = filtroData
    ? registrosVisiveis
        .filter(r => typeof r.impacto === "number")
        .reduce((s, r) => s + r.impacto, 0)
    : null;

  const taStyle = { border: "0.5px solid #e0deda", borderRadius: 8, padding: "9px 12px", fontSize: 13, color: "#111", fontFamily: "'Inter', sans-serif", lineHeight: 1.6, outline: "none", resize: "none", background: "#FAFAF8", width: "100%", boxSizing: "border-box" };
  const inStyle = { ...taStyle, padding: "8px 12px", lineHeight: 1.4 };
  const tags = [
    { tag: "O QUÊ", bg: "#FAEEDA", cor: "#854F0B", val: oq, set: setOq, ph: "O que aconteceu hoje?" },
    { tag: "POR QUÊ", bg: "#E6F1FB", cor: "#185FA5", val: pq, set: setPq, ph: "Por que isso importa?" },
    { tag: "AÇÃO", bg: "#EAF3DE", cor: "#3B6D11", val: ac, set: setAc, ph: "O que você fez ou vai fazer?" },
  ];

  return (
    <div>
      {ultimoImpacto ? (
        <div style={{
          background: ultimoImpacto.impacto >= 0 ? "#EAF3DE" : "#FCEBEB",
          border: "0.5px solid " + (ultimoImpacto.impacto >= 0 ? "#C0DD97" : "#F09595"),
          borderRadius: 18, padding: "26px 28px", marginBottom: "2rem"
        }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: ultimoImpacto.impacto >= 0 ? "#166534" : "#791F1F", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10 }}>
            Último impacto registrado
          </div>
          <div style={{ fontSize: 38, fontWeight: 600, color: ultimoImpacto.impacto >= 0 ? "#166534" : "#791F1F", lineHeight: 1.1, marginBottom: 6, letterSpacing: "-0.02em", fontVariantNumeric: "tabular-nums" }}>
            {formatBRL(ultimoImpacto.impacto)}
          </div>
          <div style={{ fontSize: 12, color: "#555", marginBottom: ultimoImpacto.oq ? 14 : 0 }}>
            {ultimoImpacto.data} às {ultimoImpacto.hora} · {ultimoImpacto.impacto >= 0 ? "ganho / prejuízo evitado" : "prejuízo registrado"}
          </div>
          {ultimoImpacto.oq && (
            <div style={{ fontSize: 13, color: "#222", lineHeight: 1.6, fontStyle: "italic" }}>
              "{ultimoImpacto.oq}"
            </div>
          )}
          <div style={{ marginTop: 18, paddingTop: 14, borderTop: "0.5px solid rgba(0,0,0,0.08)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 12, color: "#555" }}>{filtroData ? (rotuloPeriodo ? "Acumulado · " + rotuloPeriodo : "Acumulado do período") : "Acumulado do mês"}</span>
            <span style={{ fontSize: 16, fontWeight: 600, color: ((filtroData ? somaPeriodo : somaMes) >= 0) ? "#166534" : "#791F1F", fontVariantNumeric: "tabular-nums" }}>
              {formatBRL(filtroData ? somaPeriodo : somaMes)}
            </span>
          </div>
        </div>
      ) : (
        <div style={{ background: "#fff", border: "0.5px dashed #d0cfc8", borderRadius: 18, padding: "32px 28px", marginBottom: "2rem", textAlign: "center" }}>
          <div style={{ fontSize: 14, color: "#555", marginBottom: 6, fontWeight: 500 }}>
            {filtroData ? "Nenhum impacto financeiro " + (rotuloPeriodo ? "em " + rotuloPeriodo : "no período selecionado") : "Nenhum impacto financeiro registrado ainda"}
          </div>
          <div style={{ fontSize: 12, color: "#aaa" }}>Cada ação que você toma vira um número aqui. Identifiquei X → agi com Y → R$ Z.</div>
        </div>
      )}

      {!ocultarForm && (
      <div style={{ marginBottom: "2rem" }}>
        {!formOpen ? (
          <button onClick={() => setFormOpen(true)} style={{
            width: "100%", padding: "14px 16px", borderRadius: 12,
            border: "0.5px dashed #b0b0b0", background: "#fff",
            fontSize: 13, color: "#555", cursor: "pointer",
            fontFamily: "'Inter', sans-serif", fontWeight: 500,
          }}>+ Novo registro de hoje</button>
        ) : (
          <div style={{ background: "rgba(255, 255, 255, 0.7)", backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)", border: "1px solid rgba(255, 255, 255, 0.5)", boxShadow: "0 1px 3px rgba(15, 23, 42, 0.04)", borderRadius: 16, overflow: "hidden" }}>
            <div style={{ background: "#F7F6F2", padding: "10px 16px", fontSize: 12, fontWeight: 500, color: "#888", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span>Novo registro — {new Date().toLocaleDateString("pt-BR", { day: "2-digit", month: "long" })}</span>
              <button onClick={() => { limpar(); setFormOpen(false); }} style={{ fontSize: 18, color: "#aaa", background: "none", border: "none", cursor: "pointer", padding: "0 4px", lineHeight: 1 }}>×</button>
            </div>
            {tags.map((t) => (
              <div key={t.tag} style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "10px 16px", borderTop: "0.5px solid #f3f3f3" }}>
                <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 7px", borderRadius: 4, background: t.bg, color: t.cor, flexShrink: 0, marginTop: 8, whiteSpace: "nowrap" }}>{t.tag}</span>
                <textarea value={t.val} onChange={e => t.set(e.target.value)} placeholder={t.ph} rows={2} style={taStyle} />
              </div>
            ))}
            <div style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "10px 16px", borderTop: "0.5px solid #f3f3f3" }}>
              <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 7px", borderRadius: 4, background: "#DDF1F1", color: "#0C6170", flexShrink: 0, marginTop: 8, whiteSpace: "nowrap" }}>IMPACTO (R$)</span>
              <div style={{ flex: 1 }}>
                <input value={im} onChange={e => setIm(e.target.value)} placeholder="ex: 1500 · 1.500,50 · -800 (prejuízo)" inputMode="decimal" style={inStyle} />
                {im && impactoNum !== null && (
                  <div style={{ fontSize: 11, color: impactoNum < 0 ? "#A32D2D" : "#166534", marginTop: 4, fontWeight: 500 }}>= {formatBRL(impactoNum)}</div>
                )}

                  <div style={{ fontSize: 11, color: "#A32D2D", marginTop: 4 }}>Valor inválido</div>
                )}
              </div>
            </div>
            <div style={{ padding: "10px 16px", borderTop: "0.5px solid #f3f3f3", display: "flex", gap: 8 }}>
              <Btn primary onClick={salvar} disabled={!oq && !pq && !ac && impactoNum === null}>Salvar registro</Btn>
              <Btn small onClick={limpar}>Limpar</Btn>
            </div>
          </div>
        )}
      </div>
      )}

      <GraficoCorrelacao registros={registrosVisiveis} historico={historico} />

      {filtroData && registrosVisiveis.length === 0 && (
        <div style={{
          background: "#fff", border: "0.5px dashed #d0cfc8",
          borderRadius: 14, padding: "24px 20px", textAlign: "center",
          fontSize: 13, color: "#888",
        }}>
          Nenhum registro do diário {rotuloPeriodo ? "em " + rotuloPeriodo : "no período selecionado"}.
        </div>
      )}

      {registrosVisiveis.length > 0 && (
        <div>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#888", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 18 }}>

          <div style={{ position: "relative", paddingLeft: 28 }}>

              const temImpacto = typeof r.impacto === "number";
              const corDot = temImpacto ? (r.impacto >= 0 ? "#639922" : "#A32D2D") : "#bbb";
              return (
                <div key={r.id} style={{ position: "relative", marginBottom: 16 }}>
                  <div style={{ position: "absolute", left: -28, top: 14, width: 14, height: 14, borderRadius: "50%", background: corDot, border: "3px solid #FAFAF8", boxShadow: "0 0 0 1px " + corDot }} />
                  <div style={{ background: "rgba(255, 255, 255, 0.7)", backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)", border: "1px solid rgba(255, 255, 255, 0.5)", boxShadow: "0 1px 3px rgba(15, 23, 42, 0.04)", borderRadius: 16, overflow: "hidden" }}>
                    <div style={{ background: "#F7F6F2", padding: "8px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: 11, color: "#888", fontWeight: 500 }}>{r.data} às {r.hora}</span>
                      <button onClick={() => remover(r.id)} style={{ fontSize: 13, color: "#ccc", background: "none", border: "none", cursor: "pointer", padding: "0 4px" }}>×</button>
                    </div>
                    {[["O QUÊ", r.oq, "#FAEEDA", "#854F0B"], ["POR QUÊ", r.pq, "#E6F1FB", "#185FA5"], ["AÇÃO", r.ac, "#EAF3DE", "#3B6D11"]].filter(([, v]) => v).map(([tag, val, bg, cor]) => (
                      <div key={tag} style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "9px 16px", borderTop: "0.5px solid #f3f3f3" }}>
                        <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 7px", borderRadius: 4, background: bg, color: cor, flexShrink: 0, marginTop: 1, whiteSpace: "nowrap" }}>{tag}</span>
                        <span style={{ fontSize: 13, color: "#222", lineHeight: 1.5 }}>{val}</span>
                      </div>
                    ))}
                    {r.metaSnapshot && (r.metaSnapshot.gap !== null || r.metaSnapshot.pctMeta !== null) && (
                      <div style={{ display: "flex", gap: 12, alignItems: "center", padding: "9px 16px", borderTop: "0.5px solid #f3f3f3", flexWrap: "wrap" }}>
                        <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 7px", borderRadius: 4, background: "#F1EFE8", color: "#555", flexShrink: 0, whiteSpace: "nowrap" }}>CONTEXTO</span>
                        {r.metaSnapshot.pctMeta !== null && (
                          <span style={{ fontSize: 12, color: r.metaSnapshot.metaBatida ? "#3B6D11" : "#555", fontWeight: 500 }}>
                            {Math.round(r.metaSnapshot.pctMeta)}% da meta
                          </span>
                        )}
                        {r.metaSnapshot.gap !== null && r.metaSnapshot.gap > 0 && (
                          <span style={{ fontSize: 11, color: "#A32D2D" }}>
                            gap: {formatBRLInt(r.metaSnapshot.gap)}
                          </span>
                        )}
                        {r.metaSnapshot.metaBatida && (
                          <span style={{ fontSize: 11, color: "#3B6D11", fontWeight: 500 }}>meta batida</span>
                        )}
                      </div>
                    )}
                    {temImpacto && (
                      <div style={{ display: "flex", gap: 12, alignItems: "center", padding: "9px 16px", borderTop: "0.5px solid #f3f3f3" }}>
                        <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 7px", borderRadius: 4, background: "#DDF1F1", color: "#0C6170", flexShrink: 0, whiteSpace: "nowrap" }}>IMPACTO</span>
                        <span style={{ fontSize: 13, color: r.impacto < 0 ? "#A32D2D" : "#166534", fontWeight: 600 }}>{formatBRL(r.impacto)}</span>
                        {r.impacto < 0 && <span style={{ fontSize: 11, color: "#aaa" }}>prejuízo</span>}
                        {r.impacto > 0 && <span style={{ fontSize: 11, color: "#aaa" }}>ganho / evitado</span>}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

  );
}

                              title="Acertei de cabeça"
                              style={{
                                fontSize: 12,
                                padding: "5px 10px", borderRadius: 8,
                                border: "0.5px solid " + (acertoStatus === "ok" ? "#97C459" : "#d0cfc8"),
                                background: acertoStatus === "ok" ? "#EAF3DE" : "transparent",
                                color: acertoStatus === "ok" ? "#27500A" : "#555",
                                cursor: "pointer",
                                fontFamily: "'Inter', sans-serif",
                              }}
                            >
                              ✓
                            </button>
                            <button
                              onClick={() => marcarAcerto(sku.codigo, false)}
                              title="Errei"
                              style={{
                                fontSize: 12,
                                padding: "5px 10px", borderRadius: 8,
                                border: "0.5px solid " + (acertoStatus === "err" ? "#F09595" : "#d0cfc8"),
                                background: acertoStatus === "err" ? "#FCEBEB" : "transparent",
                                color: acertoStatus === "err" ? "#791F1F" : "#555",
                                cursor: "pointer",
                                fontFamily: "'Inter', sans-serif",
                              }}
                            >
                              ✗
                            </button>
                          </>
                        )}
                      </div>
                    )}
                    {ausente && (
                      <div style={{
                        marginTop: 4, padding: "6px 12px",
                        background: "#FCEBEB", border: "0.5px solid #F09595",
                        borderRadius: 8,
                        fontSize: 11, color: "#791F1F", fontWeight: 500,
                        display: "flex", alignItems: "center", gap: 6,
                      }}>
                        <span style={{ fontSize: 13 }}>⚠️</span>
                        <span>Atenção: Este SKU não performou hoje!</span>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── COMPONENTES DO NOVO LAYOUT ───────────────────────────────────────────────

function SecaoHeader({ title, subtitle }) {
  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ fontSize: 19, fontWeight: 600, color: "#111", margin: 0, letterSpacing: "-0.02em" }}>{title}</div>
      {subtitle && <div style={{ fontSize: 12, fontWeight: 400, color: "#888", marginTop: 4 }}>{subtitle}</div>}
    </div>
  );
}

function Cockpit({ status, setStatus, setHistorico, compact }) {
  const [editing, setEditing] = useState(false);
  const [draftVenda, setDraftVenda] = useState("");
  const [draftMeta, setDraftMeta] = useState("");

  const venda = parseBRL(status.venda);
  const meta = parseBRL(status.meta);
  const pctMeta = (venda !== null && meta !== null && meta > 0) ? Math.round((venda / meta) * 100) : null;
  const metaBatida = venda !== null && meta !== null && venda >= meta;
  const falta = (venda !== null && meta !== null) ? Math.max(0, meta - venda) : null;
  const superou = metaBatida ? venda - meta : 0;

  const draftVendaNum = parseBRL(draftVenda);
  const draftMetaNum = parseBRL(draftMeta);

  const abrirEdicao = () => {
    setDraftVenda(status.venda || "");
    setDraftMeta(status.meta || "");
    setEditing(true);
  };
  const salvar = () => {
    setStatus({ venda: draftVenda, meta: draftMeta });
    const novoHist = salvarHistoricoVendas(parseBRL(draftVenda), parseBRL(draftMeta));
    if (novoHist && typeof setHistorico === "function") setHistorico(novoHist);
    setEditing(false);
  };
  const cancelar = () => setEditing(false);

  const cardBase = {
    background: "rgba(255, 255, 255, 0.7)",
    backdropFilter: "blur(10px)",
    WebkitBackdropFilter: "blur(10px)",
    border: "1px solid rgba(255, 255, 255, 0.5)",
    boxShadow: "0 1px 3px rgba(15, 23, 42, 0.04), 0 1px 2px rgba(15, 23, 42, 0.03)",
    borderRadius: 16,
    padding: "22px 24px",
    boxSizing: "border-box",
  };
  const labelBase = {
    fontSize: 11, fontWeight: 600, color: "#888",
    textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 14,
  };
  const numBase = {
    fontWeight: 600, lineHeight: 1.05, letterSpacing: "-0.02em",
    fontVariantNumeric: "tabular-nums",
  };
  const inputStyle = {
    border: "0.5px solid #e0deda", borderRadius: 8, padding: "9px 12px",
    fontSize: 14, color: "#111", fontFamily: "'Inter', sans-serif",
    outline: "none", background: "#FAFAF8", width: "100%", boxSizing: "border-box",
  };

  const corFalta = falta === null ? "#bbb" : metaBatida ? "#166534" : "#A32D2D";
  const labelFalta = falta === null
    ? "preencha venda e meta"
    : metaBatida
      ? "meta batida · superou em " + formatBRLInt(superou)
      : "para bater a meta do dia";

  const precisaPreencher = venda === null && meta === null;

  if (compact) {
    // Cálculo do ritmo esperado por hora (pro-rata do dia operacional)
    const agora = new Date();
    const h = agora.getHours() + agora.getMinutes() / 60;
    const HORA_INICIO = 8;
    const HORA_FIM = 22;
    const progEsp = Math.min(1, Math.max(0, (h - HORA_INICIO) / (HORA_FIM - HORA_INICIO)));
    const vendaEsperada = (meta !== null && meta > 0) ? meta * progEsp : null;

    // Define o Status da Operação
    let stTipo = "neutro";
    let stTitulo = "Aguardando dados";
    let stSub = "Preencha venda e meta para acompanhar o ritmo.";
    if (venda !== null && meta !== null && meta > 0) {
      if (metaBatida) {
        stTipo = "saudavel";
        stTitulo = "Meta batida";
        stSub = "Superou em " + formatBRLInt(superou) + " · segue operando.";
      } else if (vendaEsperada === null || venda >= vendaEsperada * 0.95) {
        stTipo = "saudavel";
        stTitulo = "Operação Saudável";
        stSub = "Ritmo alinhado com a meta para este horário.";
      } else {
        stTipo = "alerta";
        stTitulo = "Ritmo de Venda abaixo da Meta";
        const deficit = Math.max(0, vendaEsperada - venda);
        stSub = "Atraso de " + formatBRLInt(deficit) + " em relação ao ritmo esperado.";
      }
    }

    const PAL = {
      saudavel: {
        fundo:  "linear-gradient(135deg, #F0FDF4 0%, #FFFFFF 60%)",
        borda:  "#BBF7D0",
        titulo: "#14532D",
        accent: "#16A34A",
        iconBg: "#DCFCE7",
        pctBg:  "#DCFCE7",
      },
      alerta: {
        fundo:  "linear-gradient(135deg, #FFFBEB 0%, #FFFFFF 60%)",
        borda:  "#FCD34D",
        titulo: "#7C2D12",
        accent: "#B45309",
        iconBg: "#FEF3C7",
        pctBg:  "#FEF3C7",
      },
      neutro: {
        fundo:  "linear-gradient(135deg, #F8FAFC 0%, #FFFFFF 60%)",
        borda:  "#E5E7EB",
        titulo: "#334155",
        accent: "#64748B",
        iconBg: "#F1F5F9",
        pctBg:  "#F1F5F9",
      },
    };
    const pal = PAL[stTipo];

    const IconSaudavel = (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={pal.accent} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="20 6 9 17 4 12" />

    const IconAlerta = (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={pal.accent} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
        <line x1="12" y1="9" x2="12" y2="13" />
        <line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
    );
    const IconNeutro = (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={pal.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="9" />
        <path d="M12 7v5l3 2" />
      </svg>
    );
    const statusIcon = stTipo === "saudavel" ? IconSaudavel : stTipo === "alerta" ? IconAlerta : IconNeutro;

    return (
      <div style={{
        position: "sticky", top: 0, zIndex: 15,
        background: "rgba(248, 250, 252, 0.92)",
        backdropFilter: "blur(14px)",
        WebkitBackdropFilter: "blur(14px)",
        borderBottom: "0.5px solid #e5e7eb",
        margin: "0 0 22px",
        paddingTop: 14, paddingBottom: 14,
      }}>
        {/* Painel Premium · Status da Operação */}
        <div style={{
          background: pal.fundo,
          border: "1px solid " + pal.borda,
          borderRadius: 18,
          padding: "16px 20px",
          boxShadow: "0 2px 8px rgba(15, 23, 42, 0.04), 0 1px 2px rgba(15, 23, 42, 0.03)",
          display: "flex", alignItems: "center", gap: 16,
          flexWrap: "wrap",
        }}>
          <div style={{
            width: 48, height: 48, borderRadius: "50%",
            background: pal.iconBg,
            border: "1px solid " + pal.borda,
            display: "flex", alignItems: "center", justifyContent: "center",
            flexShrink: 0,
          }}>
            {statusIcon}
          </div>
          <div style={{ flex: 1, minWidth: 200 }}>
            <div style={{
              fontSize: 10, fontWeight: 700, color: pal.accent,
              letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 3,
            }}>Status da Operação</div>
            <div style={{
              fontSize: 22, fontWeight: 600, color: pal.titulo,
              letterSpacing: "-0.02em", lineHeight: 1.2,
            }}>{stTitulo}</div>
            <div style={{ fontSize: 12, color: pal.accent, marginTop: 4, fontWeight: 500 }}>
              {stSub}
            </div>
          </div>
          {pctMeta !== null && (
            <div style={{
              textAlign: "right", minWidth: 90,
              paddingLeft: 18, borderLeft: "1px solid " + pal.borda,
            }}>
              <div style={{
                fontSize: 32, fontWeight: 600, color: pal.titulo,
                letterSpacing: "-0.03em", lineHeight: 1, fontVariantNumeric: "tabular-nums",
              }}>{pctMeta}%</div>
              <div style={{
                fontSize: 10, color: pal.accent, marginTop: 4,
                letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 600,
              }}>da meta</div>
            </div>
          )}
        </div>

        {/* Linha de métricas · compacta */}
        <div style={{ display: "flex", alignItems: "center", gap: 20, marginTop: 12, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 6, fontVariantNumeric: "tabular-nums" }}>
            <span style={{ fontSize: 10, fontWeight: 600, color: "#9ca3af", letterSpacing: "0.08em", textTransform: "uppercase" }}>Venda</span>
            <span style={{ fontSize: 15, fontWeight: 600, color: venda === null ? "#bbb" : "#111", letterSpacing: "-0.01em" }}>
              {venda === null ? "—" : formatBRLInt(venda)}
            </span>
          </div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 6, fontVariantNumeric: "tabular-nums" }}>
            <span style={{ fontSize: 10, fontWeight: 600, color: "#9ca3af", letterSpacing: "0.08em", textTransform: "uppercase" }}>Meta</span>
            <span style={{ fontSize: 15, fontWeight: 600, color: meta === null ? "#bbb" : "#111", letterSpacing: "-0.01em" }}>
              {meta === null ? "—" : formatBRLInt(meta)}
            </span>
          </div>
          {falta !== null && !metaBatida && (
            <div style={{ display: "flex", alignItems: "baseline", gap: 6, fontVariantNumeric: "tabular-nums" }}>
              <span style={{ fontSize: 10, fontWeight: 600, color: "#9ca3af", letterSpacing: "0.08em", textTransform: "uppercase" }}>Falta</span>
              <span style={{ fontSize: 15, fontWeight: 600, color: "#A32D2D", letterSpacing: "-0.01em" }}>
                {formatBRLInt(falta)}
              </span>
            </div>
          )}
          {vendaEsperada !== null && venda !== null && !metaBatida && (
            <div style={{ display: "flex", alignItems: "baseline", gap: 6, fontVariantNumeric: "tabular-nums" }}>
              <span style={{ fontSize: 10, fontWeight: 600, color: "#9ca3af", letterSpacing: "0.08em", textTransform: "uppercase" }}>Ritmo</span>
              <span style={{ fontSize: 15, fontWeight: 600, color: venda >= vendaEsperada * 0.95 ? "#16A34A" : "#B45309", letterSpacing: "-0.01em" }}>
                {formatBRLInt(vendaEsperada)}
              </span>
            </div>
          )}
          <div style={{ marginLeft: "auto" }}>
            {!editing && <Btn small onClick={abrirEdicao}>{precisaPreencher ? "Preencher" : "Editar"}</Btn>}
          </div>
        </div>

        {editing && (
          <div style={{ paddingTop: 14, paddingBottom: 6 }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 12, marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 10, color: "#888", marginBottom: 5, fontWeight: 500, letterSpacing: "0.04em", textTransform: "uppercase" }}>Venda (R$)</div>
                <input value={draftVenda} onChange={e => setDraftVenda(e.target.value)} placeholder="ex: 650000" inputMode="decimal" style={inputStyle} autoFocus />
              </div>
              <div>
                <div style={{ fontSize: 10, color: "#888", marginBottom: 5, fontWeight: 500, letterSpacing: "0.04em", textTransform: "uppercase" }}>Meta (R$)</div>
                <input value={draftMeta} onChange={e => setDraftMeta(e.target.value)} placeholder="ex: 1400000" inputMode="decimal" style={inputStyle} />
              </div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <Btn primary small onClick={salvar}>Salvar</Btn>
              <Btn small onClick={cancelar}>Cancelar</Btn>
            </div>
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{ marginBottom: "2.5rem" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, gap: 12, flexWrap: "wrap" }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: "#888", letterSpacing: "0.1em", textTransform: "uppercase" }}>
          Cockpit de Performance
        </div>
        {!editing && (
          <Btn small onClick={abrirEdicao}>{precisaPreencher ? "Preencher" : "Editar"}</Btn>
        )}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 14 }}>
        <div style={cardBase}>
          <div style={labelBase}>Venda atual</div>
          <div style={{ ...numBase, fontSize: 34, color: venda === null ? "#bbb" : "#A16207", marginBottom: pctMeta !== null ? 4 : 0 }}>
            {venda === null ? "—" : formatBRLInt(venda)}
          </div>
          {pctMeta !== null && (
            <div style={{ fontSize: 12, color: "#888", fontWeight: 500 }}>{pctMeta}% da meta</div>
          )}
        </div>

        <div style={cardBase}>
          <div style={labelBase}>Meta</div>
          <div style={{ ...numBase, fontSize: 34, color: meta === null ? "#bbb" : "#A16207" }}>

        <div style={cardBase}>
          <div style={labelBase}>Falta para a meta</div>
          <div style={{ ...numBase, fontSize: 34, color: corFalta, marginBottom: 4 }}>

          </div>
          <div style={{ fontSize: 12, color: corFalta, fontWeight: 500 }}>{labelFalta}</div>

      {editing && (

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 14, marginBottom: 16 }}>

                autoFocus

                <div style={{ fontSize: 11, color: "#A16207", marginTop: 4, fontWeight: 500 }}>= {formatBRLInt(draftVendaNum)}</div>

                <div style={{ fontSize: 11, color: "#A32D2D", marginTop: 4 }}>valor inválido</div>
              )}
            </div>
            <div>
              <div style={{ fontSize: 11, color: "#888", marginBottom: 6, fontWeight: 500 }}>Meta (R$)</div>
              <input
                value={draftMeta}
                onChange={e => setDraftMeta(e.target.value)}
                placeholder="ex: 1400000"
                inputMode="decimal"
                style={inputStyle}
              />
              {draftMeta && draftMetaNum !== null && (
                <div style={{ fontSize: 11, color: "#A16207", marginTop: 4, fontWeight: 500 }}>= {formatBRLInt(draftMetaNum)}</div>
              )}
              {draftMeta && draftMetaNum === null && (
                <div style={{ fontSize: 11, color: "#A32D2D", marginTop: 4 }}>valor inválido</div>
              )}
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <Btn primary onClick={salvar}>Salvar</Btn>
            <Btn small onClick={cancelar}>Cancelar</Btn>

              Valores salvos no navegador · sobrevivem ao F5

          </div>
        </div>
      )}
    </div>
  );
}

// ── INSIGHTS · compara hoje vs ontem (pro-rata por hora) ─────────────────────

function InsightsLuma({ venda, historico }) {
  const hojeKey = todayKey();
  const ontem = Array.isArray(historico)
    ? [...historico]
        .filter(r => r && r.data && r.data < hojeKey && typeof r.valor === "number" && r.valor > 0)
        .sort((a, b) => b.data.localeCompare(a.data))[0]
    : null;

  const agora = new Date();
  const horaAgora = agora.getHours() + agora.getMinutes() / 60;

  const palette = {
    alerta: { bg: "#FCEBEB", border: "#F09595", text: "#791F1F", accent: "#A32D2D", tag: "#F09595" },
    positivo: { bg: "#EAF3DE", border: "#C0DD97", text: "#27500A", accent: "#3B6D11", tag: "#C0DD97" },
    neutral: { bg: "#F7F6F2", border: "#e0deda", text: "#555", accent: "#888", tag: "#e0deda" },
  };

  let tone = "neutral", icon = "💡", title = "", msg = "", detalhes = null;

  if (!ontem) {
    icon = "💡";
    title = "Base de comparação em construção";
    msg = "Ainda não há histórico de ontem. Salve os números hoje e a Luma começa a te mostrar o ritmo comparado a partir de amanhã.";
  } else if (venda === null || venda === undefined) {
    icon = "📝";
    title = "Preencha o faturamento de hoje";
    msg = "Ontem (" + ontem.data.split("-").reverse().slice(0, 2).join("/") + ") fechou em " + formatBRLInt(ontem.valor) + ". Atualize a venda de hoje no Cockpit para a Luma comparar o ritmo.";
  } else {
    const tsOntem = ontem.atualizadoEm ? new Date(ontem.atualizadoEm) : null;
    const horaRefOntem = tsOntem && !isNaN(tsOntem) ? (tsOntem.getHours() + tsOntem.getMinutes() / 60) : 24;
    const horaCmp = Math.min(horaAgora, horaRefOntem);
    const esperado = horaRefOntem > 0 ? ontem.valor * (horaCmp / horaRefOntem) : ontem.valor;
    const variacao = esperado > 0 ? (venda - esperado) / esperado : 0;

    detalhes = { venda, esperado, variacao, ontem, horaRefOntem };

    if (variacao <= -0.10) {
      tone = "alerta";
      icon = "⚠️";
      title = "Atenção: Ritmo de vendas abaixo de ontem";
      msg = "Verifique a categoria de Eletro. Cheque matriz de competitividade (top SKUs 18877 · 19364 · 29057), rupturas e se algum concorrente rodou promoção relâmpago.";
    } else if (variacao >= 0.05) {
      tone = "positivo";
      icon = "🚀";
      title = "Parabéns! Ritmo acelerado comparado a ontem";
      msg = "Bom momento pra pisar fundo. Identifique a categoria que está puxando e documente no diário o que funcionou — vira caso pro weekly.";
    } else {
      tone = "neutral";
      icon = "📊";
      title = "Ritmo alinhado com ontem";
      msg = "Variação pequena em relação ao esperado. Mantém o plano e reavalia no próximo ponto de checagem.";
    }
  }

  const c = palette[tone];

  return (
    <div style={{
      background: c.bg,
      border: "0.5px solid " + c.border,
      borderRadius: 16,
      padding: "18px 22px",
      marginBottom: "2.5rem",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, gap: 10, flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 11, fontWeight: 600, color: c.accent, letterSpacing: "0.1em", textTransform: "uppercase" }}>Insights</span>
          <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 8px", borderRadius: 4, background: c.tag, color: c.accent }}>
            {tone === "alerta" ? "ALERTA" : tone === "positivo" ? "ACELERANDO" : "OBSERVANDO"}
          </span>
        </div>
        {ontem && (
          <span style={{ fontSize: 10, color: c.accent, fontWeight: 500 }}>
            base: {ontem.data.split("-").reverse().slice(0, 2).join("/")}
            {ontem.atualizadoEm && !isNaN(new Date(ontem.atualizadoEm)) && (
              " às " + new Date(ontem.atualizadoEm).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" })
            )}
          </span>
        )}
      </div>

      <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
        <div style={{ fontSize: 26, lineHeight: 1, flexShrink: 0 }}>{icon}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: c.text, lineHeight: 1.35, marginBottom: 5, letterSpacing: "-0.02em" }}>{title}</div>
          <div style={{ fontSize: 13, color: c.text, lineHeight: 1.55, opacity: 0.9 }}>{msg}</div>
        </div>
      </div>

      {detalhes && (
        <div style={{
          marginTop: 14, paddingTop: 12, borderTop: "0.5px solid rgba(0,0,0,0.08)",
          display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))", gap: 12,
          fontVariantNumeric: "tabular-nums",
        }}>
          <div>
            <div style={{ fontSize: 10, color: c.accent, fontWeight: 600, letterSpacing: "0.04em", textTransform: "uppercase", marginBottom: 3 }}>Hoje</div>

// ── GRÁFICO DE CORRELAÇÃO · registros vs batimento de meta ───────────────────

function GraficoCorrelacao({ registros, historico }) {
  const regsByDate = {};
  (registros || []).forEach(r => {
    const d = new Date(r.id);
    if (isNaN(d)) return;
    const key = d.toISOString().split("T")[0];
    regsByDate[key] = (regsByDate[key] || 0) + 1;
  });

  const metaByDate = {};
  (historico || []).forEach(h => {
    if (h && h.data && typeof h.valor === "number" && typeof h.meta === "number" && h.meta > 0) {
      metaByDate[h.data] = (h.valor / h.meta) * 100;
    }
  });

  const allDates = Array.from(new Set([
    ...Object.keys(regsByDate),
    ...Object.keys(metaByDate),
  ]));

  const LIMIT = 7;
  const rows = allDates.map(d => ({
    data: d,
    regs: regsByDate[d] || 0,
    pct: typeof metaByDate[d] === "number" ? metaByDate[d] : null,
  }));

  const topRegs = [...rows]
    .filter(x => x.regs > 0)
    .sort((a, b) => b.regs - a.regs || (b.pct || 0) - (a.pct || 0))
    .slice(0, LIMIT);

  const topMeta = [...rows]
    .filter(x => typeof x.pct === "number")
    .sort((a, b) => (b.pct || 0) - (a.pct || 0))
    .slice(0, LIMIT);

  const overlap = new Set(
    topRegs.map(x => x.data).filter(d => topMeta.some(y => y.data === d))
  );

  const fmtD = (d) => d.split("-").reverse().slice(0, 2).join("/");
  const maxRegs = Math.max(1, ...topRegs.map(x => x.regs));
  const maxPct = Math.max(100, ...topMeta.map(x => x.pct || 0));

  const vazio = topRegs.length === 0 && topMeta.length === 0;

  return (
    <div style={{
      background: "rgba(255, 255, 255, 0.7)", backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)", border: "1px solid rgba(255, 255, 255, 0.5)", boxShadow: "0 1px 3px rgba(15, 23, 42, 0.04)", borderRadius: 16,
      padding: "20px 22px", marginBottom: "2rem",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4, gap: 10, flexWrap: "wrap" }}>
        <span style={{ fontSize: 11, fontWeight: 600, color: "#888", letterSpacing: "0.1em", textTransform: "uppercase" }}>
          Correlação
        </span>
        {!vazio && (
          <span style={{ fontSize: 10, color: "#aaa", fontWeight: 500 }}>
            top {LIMIT} de cada ranking
          </span>
        )}
      </div>
      <div style={{ fontSize: 14, fontWeight: 600, color: "#111", marginBottom: 4, letterSpacing: "-0.02em" }}>
        Dias com mais registros vs. dias com melhor batimento
      </div>
      <div style={{ fontSize: 12, color: "#888", marginBottom: 18, lineHeight: 1.5 }}>
        Dias marcados com <span style={{ color: "#D4AF37", fontWeight: 600 }}>▲</span> aparecem em ambos os rankings — sinal de que ação registrada tende a virar número.
      </div>

      {vazio ? (
        <div style={{
          background: "#F7F6F2", border: "0.5px dashed #d0cfc8", borderRadius: 10,
          padding: "18px 14px", fontSize: 12, color: "#888", textAlign: "center", lineHeight: 1.6,
        }}>
          Ainda não há dados suficientes.<br />
          Salve registros no diário e atualize o Cockpit por alguns dias para ver a correlação.
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 22 }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#534AB7", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 12 }}>
              Mais registros no diário
            </div>
            {topRegs.length === 0 ? (
              <div style={{ fontSize: 12, color: "#bbb" }}>nenhum registro ainda</div>
            ) : topRegs.map(item => (
              <div key={"r-" + item.data} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
                  <span style={{ fontSize: 12, color: "#555", fontWeight: 500 }}>
                    {overlap.has(item.data) && <span style={{ color: "#D4AF37", marginRight: 4, fontWeight: 600 }}>▲</span>}
                    {fmtD(item.data)}
                  </span>
                  <span style={{ fontSize: 11, color: "#888", fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>
                    {item.regs} {item.regs === 1 ? "reg" : "regs"}
                    {typeof item.pct === "number" && (
                      <span style={{ color: item.pct >= 100 ? "#3B6D11" : "#A32D2D", marginLeft: 6 }}>
                        · {Math.round(item.pct)}%
                      </span>
                    )}
                  </span>
                </div>
                <div style={{ height: 6, background: "#EEEDFE", borderRadius: 3, overflow: "hidden" }}>
                  <div style={{
                    height: 6, width: (item.regs / maxRegs * 100) + "%",
                    background: "#534AB7", borderRadius: 3, transition: "width 0.4s " + EASE,
                  }} />
                </div>
              </div>
            ))}
          </div>

          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#3B6D11", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 12 }}>
              Melhor batimento de meta
            </div>
            {topMeta.length === 0 ? (
              <div style={{ fontSize: 12, color: "#bbb" }}>salve valores do Cockpit para começar</div>
            ) : topMeta.map(item => (
              <div key={"m-" + item.data} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
                  <span style={{ fontSize: 12, color: "#555", fontWeight: 500 }}>
                    {overlap.has(item.data) && <span style={{ color: "#D4AF37", marginRight: 4, fontWeight: 600 }}>▲</span>}
                    {fmtD(item.data)}
                  </span>
                  <span style={{ fontSize: 11, color: item.pct >= 100 ? "#3B6D11" : "#888", fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>
                    {Math.round(item.pct)}%
                    {item.regs > 0 && (
                      <span style={{ color: "#534AB7", marginLeft: 6 }}>
                        · {item.regs} {item.regs === 1 ? "reg" : "regs"}
                      </span>
                    )}
                  </span>
                </div>
                <div style={{ height: 6, background: "#EAF3DE", borderRadius: 3, overflow: "hidden" }}>
                  <div style={{
                    height: 6, width: Math.min(100, item.pct / maxPct * 100) + "%",
                    background: item.pct >= 100 ? "#3B6D11" : "#97C459", borderRadius: 3,
                    transition: "width 0.4s " + EASE,
                  }} />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {overlap.size > 0 && (
        <div style={{
          marginTop: 16, padding: "10px 14px", background: "#FFF9E6",
          border: "0.5px solid #F0D674", borderRadius: 10, fontSize: 12,
          color: "#8A6A10", lineHeight: 1.5,
        }}>
          <strong>Sinal:</strong> {overlap.size} {overlap.size === 1 ? "dia está" : "dias estão"} no top de ambos os rankings — quando você registra mais, tende a bater mais meta. Continue operando assim.
        </div>
      )}
    </div>
  );
}

// ── MODAL: CONFIGURAÇÕES (BACKUP / RESTAURAÇÃO) ─────────────────────────────

function SettingsModal({ open, onClose }) {
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);
  const fileRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, onClose]);

  useEffect(() => {
    if (!open) { setMsg(null); setBusy(false); }
  }, [open]);

  if (!open) return null;

  const exportar = () => {
    try {
      const dados = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k !== null) dados[k] = localStorage.getItem(k);
      }
      const payload = {
        app: "Central Thaylane",
        versao: 1,
        exportadoEm: new Date().toISOString(),
        dados,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      const ts = new Date().toISOString().split("T")[0];
      a.download = "central-thaylane-backup-" + ts + ".json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 500);
      const total = Object.keys(dados).length;
      setMsg({ tipo: "ok", texto: "Backup exportado · " + total + " " + (total === 1 ? "registro" : "registros") });
    } catch (err) {
      setMsg({ tipo: "erro", texto: "Não foi possível exportar. Tente novamente." });
    }
  };

  const escolherArquivo = () => {
    setMsg(null);
    if (fileRef.current) fileRef.current.click();
  };

  const aoLerArquivo = (e) => {
    const arquivo = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!arquivo) return;
    const reader = new FileReader();
    setBusy(true);
    reader.onload = () => {
      try {
        const conteudo = JSON.parse(reader.result);
        const dados = conteudo && conteudo.dados && typeof conteudo.dados === "object"
          ? conteudo.dados
          : conteudo;
        if (!dados || typeof dados !== "object" || Array.isArray(dados)) {
          throw new Error("Formato inválido");
        }
        const confirma = window.confirm(
          "Restaurar este backup?\n\nSuas anotações, checklist e impactos atuais serão substituídos. A página será recarregada ao final."
        );
        if (!confirma) { setBusy(false); return; }

        Object.keys(dados).forEach(k => {
          const v = dados[k];
          localStorage.setItem(k, typeof v === "string" ? v : JSON.stringify(v));
        });
        setMsg({ tipo: "ok", texto: "Restauração concluída. Recarregando..." });
        setTimeout(() => window.location.reload(), 900);
      } catch (err) {
        setBusy(false);
        setMsg({ tipo: "erro", texto: "Arquivo inválido. Use um backup exportado pela Central." });
      }
    };
    reader.onerror = () => {
      setBusy(false);
      setMsg({ tipo: "erro", texto: "Não foi possível ler o arquivo." });
    };
    reader.readAsText(arquivo);
  };

  const IconDownload = (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 3v12" />
      <path d="m7 10 5 5 5-5" />
      <path d="M5 21h14" />
    </svg>
  );
  const IconUpload = (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 15V3" />
      <path d="m7 8 5-5 5 5" />
      <path d="M5 21h14" />
    </svg>
  );

  const ActionCard = ({ icon, titulo, desc, onClick, primary }) => {
    const [hover, setHover] = useState(false);
    return (
      <button
        onClick={onClick}
        disabled={busy}
        onMouseEnter={() => !busy && setHover(true)}
        onMouseLeave={() => setHover(false)}
        style={{
          width: "100%",
          display: "flex", alignItems: "center", gap: 14,
          padding: "14px 16px",
          borderRadius: 14,
          border: "0.5px solid " + (hover ? "#d4d4d4" : "#ececec"),
          background: hover ? "#FAFAFA" : "#fff",
          textAlign: "left",
          cursor: busy ? "default" : "pointer",
          fontFamily: "'Inter', sans-serif",
          transition: "all 0.2s " + EASE,
          opacity: busy ? 0.5 : 1,
        }}
      >
        <div style={{
          width: 38, height: 38, borderRadius: 10,
          background: primary ? "#111" : "#F3F4F6",
          color: primary ? "#fff" : "#111",
          display: "flex", alignItems: "center", justifyContent: "center",
          flexShrink: 0,
          transition: "all 0.2s " + EASE,
        }}>{icon}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: "#111", letterSpacing: "-0.01em", marginBottom: 2 }}>{titulo}</div>
          <div style={{ fontSize: 12, color: "#6b7280", lineHeight: 1.45 }}>{desc}</div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={hover ? "#111" : "#c7c7c7"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{ transition: "all 0.2s " + EASE, flexShrink: 0 }}>
          <path d="m9 18 6-6-6-6" />
        </svg>
      </button>
    );
  };

  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0,
      background: "rgba(15, 23, 42, 0.45)",
      backdropFilter: "blur(6px)",
      WebkitBackdropFilter: "blur(6px)",
      display: "flex", alignItems: "center", justifyContent: "center",
      zIndex: 100, padding: 24,
      fontFamily: "'Inter', sans-serif",
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: "#fff", borderRadius: 22,
        maxWidth: 460, width: "100%",
        boxShadow: "0 24px 60px rgba(15, 23, 42, 0.28)",
        overflow: "hidden",
      }}>
        <div style={{ padding: "22px 24px 18px", borderBottom: "0.5px solid #f1f1f1", display: "flex", alignItems: "flex-start" }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 16, fontWeight: 600, color: "#111", letterSpacing: "-0.015em" }}>Configurações</div>
            <div style={{ fontSize: 12, color: "#6b7280", marginTop: 3 }}>Backup e restauração das suas anotações</div>
          </div>
          <button onClick={onClose} aria-label="Fechar" style={{ fontSize: 22, color: "#9ca3af", background: "none", border: "none", cursor: "pointer", padding: "0 4px", lineHeight: 1 }}>×</button>
        </div>

        <div style={{ padding: 20, display: "flex", flexDirection: "column", gap: 10 }}>
          <ActionCard
            icon={IconDownload}
            titulo="Exportar dados"
            desc="Salva um arquivo .json com todas as suas anotações, checklist e impactos."
            onClick={exportar}
            primary
          />
          <ActionCard
            icon={IconUpload}
            titulo="Importar dados"
            desc="Restaure um backup anterior para carregar suas anotações em outro computador."
            onClick={escolherArquivo}
          />

          <input
            ref={fileRef}
            type="file"
            accept="application/json,.json"
            onChange={aoLerArquivo}
            style={{ display: "none" }}
          />

          {msg && (
            <div style={{
              marginTop: 4,
              padding: "10px 12px",
              borderRadius: 10,
              fontSize: 12,
              background: msg.tipo === "ok" ? "#ECFDF5" : "#FEF2F2",
              color: msg.tipo === "ok" ? "#065F46" : "#991B1B",
              border: "0.5px solid " + (msg.tipo === "ok" ? "#A7F3D0" : "#FECACA"),
            }}>{msg.texto}</div>
          )}
        </div>

        <div style={{ padding: "12px 20px 16px", borderTop: "0.5px solid #f1f1f1", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
          <div style={{ fontSize: 11, color: "#9ca3af", letterSpacing: "0.005em" }}>Seus dados ficam apenas neste dispositivo.</div>
          <Btn small onClick={onClose}>Fechar</Btn>
        </div>
      </div>
    </div>
  );
}

// ── HELPERS DE DATA / RELATÓRIO ──────────────────────────────────────────────

const toYMD = (d) => {
  const ano = d.getFullYear();
  const mes = String(d.getMonth() + 1).padStart(2, "0");
  const dia = String(d.getDate()).padStart(2, "0");
  return `${ano}-${mes}-${dia}`;
};

const fromYMD = (ymd) => {
  const [a, m, d] = ymd.split("-").map(Number);
  return new Date(a, m - 1, d);
};

const formatDataBR = (ymd) => {
  if (!ymd) return "";
  const [a, m, d] = ymd.split("-");
  return `${d}/${m}/${a}`;
};

const DIAS_SEMANA_LONGO = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];

const formatDataLongaBR = (ymd) => {
  const d = fromYMD(ymd);
  return `${DIAS_SEMANA_LONGO[d.getDay()]}, ${formatDataBR(ymd)}`;
};

const rangeDeDias = (inicio, fim) => {
  const dias = [];
  const d = fromYMD(inicio);
  const end = fromYMD(fim);
  while (d <= end) {
    dias.push(toYMD(d));
    d.setDate(d.getDate() + 1);
  }
  return dias;
};

const presetsPeriodo = () => {
  const hoje = new Date();
  const ontem = new Date(hoje); ontem.setDate(ontem.getDate() - 1);
  const diaSemana = hoje.getDay();
  const segundaAtual = new Date(hoje); segundaAtual.setDate(hoje.getDate() - ((diaSemana + 6) % 7));
  const segundaAnt = new Date(segundaAtual); segundaAnt.setDate(segundaAnt.getDate() - 7);
  const sextaAnt = new Date(segundaAnt); sextaAnt.setDate(sextaAnt.getDate() + 4);
  const ultimos7 = new Date(hoje); ultimos7.setDate(hoje.getDate() - 6);
  const mesInicio = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
  return {
    hoje:         { inicio: toYMD(hoje),         fim: toYMD(hoje),         label: "Hoje" },
    ontem:        { inicio: toYMD(ontem),        fim: toYMD(ontem),        label: "Ontem" },
    estaSemana:   { inicio: toYMD(segundaAtual), fim: toYMD(hoje),         label: "Esta semana" },
    semanaPass:   { inicio: toYMD(segundaAnt),   fim: toYMD(sextaAnt),     label: "Semana passada" },
    ultimos7:     { inicio: toYMD(ultimos7),     fim: toYMD(hoje),         label: "Últimos 7 dias" },
    mes:          { inicio: toYMD(mesInicio),    fim: toYMD(hoje),         label: "Este mês" },
  };
};

const lerObsData = (ymd) => {
  try {
    const raw = localStorage.getItem("obs_" + ymd);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
};

// Monta um relatório estruturado por dia (para texto, preview e PDF)
function gerarDadosRelatorio({ inicio, fim, registros }) {
  const dias = rangeDeDias(inicio, fim);
  const checklistItensMap = {};
  CHECKLIST.forEach(b => b.items.forEach(it => {
    checklistItensMap[it.id] = { tarefa: it.texto, bloco: b.label, hora: b.hora };
  }));

  const porDia = dias.map(ymd => {
    const obs = lerObsData(ymd);
    const observacoes = Object.entries(obs)
      .filter(([, v]) => (v || "").trim())
      .map(([id, v]) => ({
        id,
        texto: v.trim(),
        tarefa: (checklistItensMap[id] && checklistItensMap[id].tarefa) || id,
        bloco: (checklistItensMap[id] && checklistItensMap[id].bloco) || "",
        hora: (checklistItensMap[id] && checklistItensMap[id].hora) || "",
      }));

    const regs = registros
      .filter(r => toYMD(new Date(r.id)) === ymd)
      .sort((a, b) => a.id - b.id);

    return { ymd, observacoes, registros: regs };
  });

  const totalRegistros = porDia.reduce((s, d) => s + d.registros.length, 0);
  const totalObs = porDia.reduce((s, d) => s + d.observacoes.length, 0);
  const impactoTotal = porDia.reduce((s, d) =>
    s + d.registros.reduce((s2, r) => s2 + (typeof r.impacto === "number" ? r.impacto : 0), 0)
  , 0);
  const diasComAtividade = porDia.filter(d => d.observacoes.length > 0 || d.registros.length > 0).length;

  return { dias, porDia, totalRegistros, totalObs, impactoTotal, diasComAtividade };
}

// Texto puro (para clipboard / .txt)
function gerarRelatorioTexto({ inicio, fim, registros }) {
  const dados = gerarDadosRelatorio({ inicio, fim, registros });
  const linhas = [];
  const agora = new Date();
  const geradoEm = `${String(agora.getDate()).padStart(2, "0")}/${String(agora.getMonth() + 1).padStart(2, "0")}/${agora.getFullYear()} às ${String(agora.getHours()).padStart(2, "0")}:${String(agora.getMinutes()).padStart(2, "0")}`;

  linhas.push("═══════════════════════════════════════════");
  linhas.push("RELATÓRIO · Central Thaylane");
  linhas.push("═══════════════════════════════════════════");
  linhas.push(`Período: ${formatDataBR(inicio)} a ${formatDataBR(fim)} (${dados.dias.length} ${dados.dias.length === 1 ? "dia" : "dias"})`);
  linhas.push(`Gerado em: ${geradoEm}`);
  linhas.push("");
  linhas.push("── RESUMO ─────────────────────────────────");
  linhas.push(`• Dias com atividade: ${dados.diasComAtividade} de ${dados.dias.length}`);
  linhas.push(`• Registros no diário: ${dados.totalRegistros}`);
  linhas.push(`• Observações do checklist: ${dados.totalObs}`);
  if (dados.impactoTotal !== 0) {
    linhas.push(`• Impacto financeiro acumulado: ${formatBRL(dados.impactoTotal)}`);
  }
  linhas.push("");

  dados.porDia.forEach(dia => {
    if (dia.observacoes.length === 0 && dia.registros.length === 0) return;

    linhas.push(`━━━ ${formatDataLongaBR(dia.ymd)} ━━━`);
    linhas.push("");

    if (dia.registros.length > 0) {
      linhas.push(`Registros do diário (${dia.registros.length}):`);
      dia.registros.forEach(r => {
        linhas.push(`  [${r.hora}]`);
        if (r.oq) linhas.push(`    O QUÊ:   ${r.oq}`);
        if (r.pq) linhas.push(`    POR QUÊ: ${r.pq}`);
        if (r.ac) linhas.push(`    AÇÃO:    ${r.ac}`);
        if (typeof r.impacto === "number") linhas.push(`    IMPACTO: ${formatBRL(r.impacto)}`);
        linhas.push("");
      });
    }

    if (dia.observacoes.length > 0) {
      linhas.push(`Observações do checklist (${dia.observacoes.length}):`);
      dia.observacoes.forEach(o => {
        linhas.push(`  • [${o.hora}] ${o.tarefa}`);
        linhas.push(`    → ${o.texto}`);
      });
      linhas.push("");
    }
  });

  if (dados.diasComAtividade === 0) {
    linhas.push("Nenhum registro ou observação no período selecionado.");
    linhas.push("");
  }

  linhas.push("───────────────────────────────────────────");
  linhas.push("Fim do relatório · Central Thaylane");

  return linhas.join("\n");
}

      ${dados.impactoTotal !== 0 ? `<li>Impacto financeiro acumulado: <strong style="color:${dados.impactoTotal >= 0 ? "#166534" : "#A32D2D"}">${esc(formatBRL(dados.impactoTotal))}</strong></li>` : ""}
    </ul>
  </div>

  ${corpoDias}
  ${vazioHTML}

  <footer>Central Thaylane · Relatório gerado automaticamente · ${esc(geradoEm)}</footer>
\x3c/body\x3e
\x3c/html\x3e`;
  // Os closing tags acima usam escape hex (\x3c = menor-que) de proposito.
  // Em runtime viram as tags HTML corretas, mas no arquivo em disco nao
  // aparecem literais — isso evita que o Live Server injete o script de
  // auto-reload aqui dentro desta template literal (ele procura o primeiro
  // fechamento de body no arquivo e injeta antes dele).
}
